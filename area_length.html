<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Area-Length法">
  <title>Area-Length法　左室容積 / EF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede9;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #aeada8;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f0efeb;
        --text2: #a0a09c;
        --text3: #686864;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 24px 0 16px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* Formula */
    .formula-bar {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      text-align: center;
      margin-bottom: 20px;
    }
    .formula-bar .f {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .formula-bar .note {
      font-size: 11px;
      color: var(--text2);
      margin-top: 3px;
    }

    /* Phase columns */
    .phase-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .phase-col {
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .phase-title {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .ed .phase-title { background: #deeefb; color: #0a4a8a; }
    .es .phase-title { background: #faebd4; color: #7a4a08; }

    @media (prefers-color-scheme: dark) {
      .ed .phase-title { background: #0c3458; color: #90c8f0; }
      .es .phase-title { background: #4a3010; color: #f0c070; }
    }

    /* Input fields */
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 10px;
      color: var(--text2);
      margin-bottom: 4px;
      font-weight: 500;
    }
    .field-row {
      display: flex;
      align-items: center;
      background: var(--bg2);
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      padding: 8px 8px 8px 10px;
      transition: border-color 0.15s;
    }
    .field-row:focus-within {
      border-color: #378ADD;
      background: var(--bg);
    }
    .field-row input {
      flex: 1;
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      min-width: 0;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }
    .field-row input::-webkit-inner-spin-button,
    .field-row input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field-row input::placeholder { color: var(--text3); font-size: 14px; font-weight: 400; }
    .field-unit {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      margin-left: 4px;
    }

    /* Calc button */
    .calc-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: var(--radius);
      border: none;
      background: #1a1a18;
      color: #ffffff;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-color-scheme: dark) {
      .calc-btn { background: #f0efeb; color: #1a1a18; }
    }
    .calc-btn:active { opacity: 0.8; transform: scale(0.98); }

    .err {
      font-size: 12px;
      color: #c0392b;
      text-align: center;
      margin-top: 8px;
      display: none;
    }

    /* Results */
    .divider { height: 0.5px; background: var(--border); margin: 20px 0; }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .mc {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .ml { font-size: 10px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
    .mv { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1.1; }
    .mu { font-size: 11px; color: var(--text3); margin-left: 2px; font-weight: 400; }

    /* EF card */
    .ef-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ef-left { min-width: 80px; text-align: center; }
    .ef-num { font-size: 42px; font-weight: 300; line-height: 1; color: var(--text); }
    .ef-pct { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .ef-right { flex: 1; }
    .ef-bar-bg {
      height: 8px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .ef-bar-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .ef-status { font-size: 13px; font-weight: 600; }
    .ef-range { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Reset */
    .reset-btn {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      font-size: 13px;
      color: var(--text2);
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { background: var(--bg2); }

    /* Safe area for iPhone */
    .bottom-safe { height: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Area-Length法　左室容積 / EF</h1>
      <p>短軸面積（乳頭筋レベル）＋ 二腔像長軸長（心尖部〜Ao弁）</p>
    </div>

    <div class="formula-bar">
      <div class="f">V = 0.85 × A² / L</div>
      <div class="note">A：短軸面積（cm²）　L：二腔像長軸長（cm）</div>
    </div>

    <div class="phase-row">
      <div class="phase-col ed">
        <div class="phase-title">拡張末期 ED</div>
        <div class="field">
          <div class="field-label">短軸面積 A_ED（cm²）</div>
          <div class="field-row">
            <input type="number" id="aed" inputmode="decimal" placeholder="0.0" min="0" step="0.1">
            <span class="field-unit">cm²</span>
          </div>
        </div>
        <div class="field">
          <div class="field-label">長軸長 L_ED（cm）</div>
          <div class="field-row">
            <input type="number" id="led" inputmode="decimal" placeholder="0.0" min="0" step="0.1">
            <span class="field-unit">cm</span>
          </div>
        </div>
      </div>

      <div class="phase-col es">
        <div class="phase-title">収縮末期 ES</div>
        <div class="field">
          <div class="field-label">短軸面積 A_ES（cm²）</div>
          <div class="field-row">
            <input type="number" id="aes" inputmode="decimal" placeholder="0.0" min="0" step="0.1">
            <span class="field-unit">cm²</span>
          </div>
        </div>
        <div class="field">
          <div class="field-label">長軸長 L_ES（cm）</div>
          <div class="field-row">
            <input type="number" id="les" inputmode="decimal" placeholder="0.0" min="0" step="0.1">
            <span class="field-unit">cm</span>
          </div>
        </div>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">計算する</button>
    <div class="err" id="err">すべての値を正しく入力してください</div>

    <div id="results" style="display:none;">
      <div class="divider"></div>
      <div class="res-grid">
        <div class="mc">
          <div class="ml">EDV（拡張末期容積）</div>
          <div class="mv" id="r-edv">—</div>
        </div>
        <div class="mc">
          <div class="ml">ESV（収縮末期容積）</div>
          <div class="mv" id="r-esv">—</div>
        </div>
      </div>
      <div class="res-grid">
        <div class="mc">
          <div class="ml">SV（一回拍出量）</div>
          <div class="mv" id="r-sv">—</div>
        </div>
        <div class="mc">
          <div class="ml">EF（駆出率）</div>
          <div class="mv" id="r-ef-s">—</div>
        </div>
      </div>

      <div class="ef-card">
        <div class="ef-left">
          <div class="ef-num" id="r-ef-big">—</div>
          <div class="ef-pct">%</div>
        </div>
        <div class="ef-right">
          <div class="ef-bar-bg">
            <div class="ef-bar-fill" id="ef-bar"></div>
          </div>
          <div class="ef-status" id="ef-status"></div>
          <div class="ef-range" id="ef-range"></div>
        </div>
      </div>

      <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>

    <div class="bottom-safe"></div>
  </div>

  <script>
    function calculate() {
      const aed = parseFloat(document.getElementById('aed').value);
      const led = parseFloat(document.getElementById('led').value);
      const aes = parseFloat(document.getElementById('aes').value);
      const les = parseFloat(document.getElementById('les').value);
      const err = document.getElementById('err');

      if ([aed, led, aes, les].some(v => isNaN(v) || v <= 0)) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';

      const edv = (0.85 * aed * aed) / led;
      const esv = (0.85 * aes * aes) / les;
      const sv  = edv - esv;
      const ef  = (sv / edv) * 100;

      document.getElementById('r-edv').innerHTML = Math.round(edv) + '<span class="mu">mL</span>';
      document.getElementById('r-esv').innerHTML = Math.round(esv) + '<span class="mu">mL</span>';
      document.getElementById('r-sv').innerHTML  = Math.round(sv)  + '<span class="mu">mL</span>';
      document.getElementById('r-ef-s').innerHTML = ef.toFixed(1)  + '<span class="mu">%</span>';
      document.getElementById('r-ef-big').textContent = ef.toFixed(1);

      let barColor, statusText, statusColor, rangeText;
      if (ef >= 55) {
        barColor = '#1D9E75'; statusColor = '#0F6E56';
        statusText = '正常域'; rangeText = '基準値：EF ≥ 55%';
      } else if (ef >= 40) {
        barColor = '#EF9F27'; statusColor = '#854F0B';
        statusText = '軽度〜中等度低下'; rangeText = '基準値：EF 40–54%';
      } else {
        barColor = '#E24B4A'; statusColor = '#A32D2D';
        statusText = '高度低下'; rangeText = '基準値：EF < 40%';
      }

      const bar = document.getElementById('ef-bar');
      bar.style.width = Math.min(ef, 100) + '%';
      bar.style.background = barColor;
      document.getElementById('ef-status').style.color = statusColor;
      document.getElementById('ef-status').textContent = statusText;
      document.getElementById('ef-range').textContent = rangeText;

      document.getElementById('results').style.display = 'block';
      setTimeout(() => {
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }

    function resetAll() {
      ['aed','led','aes','les'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('results').style.display = 'none';
      document.getElementById('err').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
